<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Registration Form</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="contanier">
            <form  method="post" action="index.html">
                <fieldset>
                <h1>Registration Form</h1>
                <p>Please fill out this form with the required information</p>
                <label for="username">Name: </label><input type="text" id="name" required /></label>
                <label for="new-password">Create Your Password: <input type="password" id="new-password" pattern="[a-z0-5]{8,}" /></label>
                <label for="email">Email: <input type="email" id="email" required /></label>
                </fieldset>
                <fieldset>
                    <legend>Account type (required)</legend>
                    <label for="personal-account"><input id="personal-account" type="radio" name="account-type" checked />Personal</label>
                    <label for="Business-account" ><input id="business-account" type="radio" name="account-type"/>Business</label>
                </fieldset>
                <fieldset>
                    <legend>Interests (optional)</legend>
                    <label for="coding"><input id="coding" type="checkbox" name="interests" />Coding</label>
                    <label for="gaming"><input id="gaming" type="checkbox" name="interests" />Gaming</label>
                    <label for="reading"><input id="reading" type="checkbox" name="interests" />Reading</label>
                    <label for="sports"><input id="sports" type="checkbox" name="interests" />Sports</label>
                </fieldset>
                <input type="submit" value="Submit">      
        </div>
    </body>
</html>
